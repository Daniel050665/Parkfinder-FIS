spring.application.name=park-finder

# H2 en memoria - datos frescos en cada arranque
spring.datasource.url=jdbc:h2:mem:parkfinder
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate crea el schema, luego corre data.sql
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Evita que Spring Boot intente levantar Tomcat (tenemos web en classpath por los REST controllers)
spring.main.web-application-type=NONE

spring.jpa.show-sql=false
